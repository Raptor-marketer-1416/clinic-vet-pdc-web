      - generic [ref=e43]:
        - generic [ref=e44]: ¿Qué incluye?
        - heading "¿Qué incluye una consulta veterinaria con nosotros?" [level=2] [ref=e45]
      - generic [ref=e46]:
        - strong [ref=e47]: Una consulta veterinaria en Clinic Vet PDC incluye
        - text: evaluación clínica completa, revisión de signos vitales, examen físico de cabeza a cola, diagnóstico inicial y plan de tratamiento personalizado. Si tu mascota requiere estudios adicionales (rayos X, ultrasonido o análisis clínicos), los realizamos en la misma visita sin necesidad de derivarte a otro lugar. La consulta dura entre 30 y 45 minutos.
      - paragraph [ref=e48]:
        - text: Cada consulta empieza por
        - strong [ref=e49]: escucharte
        - text: ": cuándo notaste el cambio, qué síntomas viste, qué come, su rutina, antecedentes. Esa conversación es la mitad del diagnóstico — un veterinario que solo revisa al animal sin entender el contexto se pierde la mayor parte del cuadro."
      - paragraph [ref=e50]: "Después viene el examen físico completo: peso, temperatura, frecuencia cardíaca y respiratoria, palpación abdominal, revisión de oídos, ojos, boca, piel y articulaciones. Si encontramos algo que requiere confirmación, hacemos los estudios necesarios en la misma cita."
    - generic [ref=e52]:
      - generic [ref=e53]:
        - generic [ref=e54]: Cuándo traerla
        - heading "Cuándo es buen momento para traer a tu mascota" [level=2] [ref=e55]
      - generic [ref=e56]:
        - generic [ref=e57]:
          - heading "Revisión de rutina" [level=3] [ref=e58]
          - paragraph [ref=e59]: Cada 6 a 12 meses, aunque tu mascota se vea sana. Detectamos problemas tempranos en sangre, dientes y peso antes de que sean clínicamente evidentes.
        - generic [ref=e60]:
          - heading "Cambios de comportamiento" [level=3] [ref=e61]
          - paragraph [ref=e62]: Come menos, duerme más, está irritable, deja de jugar, se esconde, se rasca. Casi siempre hay una causa médica detrás.
        - generic [ref=e63]:
          - heading "Síntomas digestivos" [level=3] [ref=e64]
          - paragraph [ref=e65]: Vómito, diarrea, estreñimiento, falta de apetito por más de 24 horas en perros adultos o 12 horas en cachorros y gatos.
        - generic [ref=e66]:
          - heading "Problemas de piel o pelo" [level=3] [ref=e67]
          - paragraph [ref=e68]:
            - text: Comezón persistente, costras, caída de pelo localizada. Si es recurrente, derivamos a
            - link "Dermatología" [ref=e69] [cursor=pointer]:
